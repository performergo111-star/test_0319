<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>베리 팡팡! - Berry Pang Pang</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        /* Custom fonts and animations */
        @import url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/DungGeunMo.woff');
        
        :root {
            --primary: #f43f5e;
            --bg-soft: #fff9fa;
        }

        body {
            font-family: 'DungGeunMo', sans-serif;
            background-color: #fff9fa;
            user-select: none;
            overflow: hidden;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .title-font { 
            font-family: 'Black Han Sans', sans-serif; 
            -webkit-text-stroke: 1.2px white;
            paint-order: stroke fill;
        }

        /* Item Pop Animation */
        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .pop-item { animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Canvas Grid Pattern */
        .game-canvas {
            background-image: linear-gradient(#fff0f3 1px, transparent 1px), linear-gradient(90deg, #fff0f3 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .item-btn {
            position: absolute;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            z-index: 20;
        }

        /* Custom Cursor for Web PC */
        @media (pointer: fine) {
            .custom-cursor {
                cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="%23f43f5e" stroke="white" stroke-width="2"><path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path></svg>'), auto;
            }
        }

        .main-wrapper {
            max-width: 500px;
            width: 100%;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 custom-cursor">

    <div class="main-wrapper flex flex-col items-center">
        <!-- Dashboard: Timer, Score, Best Record -->
        <div class="w-full flex justify-between items-center mb-4 bg-white p-4 rounded-[1.2rem] shadow-sm border-b-4 border-rose-50">
            <div class="flex flex-col items-center flex-1">
                <span class="text-[9px] font-bold text-rose-300 uppercase tracking-tighter">Time</span>
                <span id="timer-display" class="text-xl font-bold text-gray-600 tracking-tight">30s</span>
            </div>
            <div class="flex flex-col items-center flex-1 border-x border-rose-50 px-2">
                <span class="text-[9px] text-rose-200 font-bold uppercase mb-1">Score</span>
                <span id="score-display" class="text-4xl font-bold text-rose-400 leading-none">0</span>
            </div>
            <div class="flex flex-col items-center flex-1">
                <span class="text-[9px] font-bold text-yellow-400 uppercase tracking-tighter">Best</span>
                <span id="best-display" class="text-xl font-bold text-gray-600 tracking-tight">0</span>
            </div>
        </div>

        <!-- Game Canvas Container -->
        <div id="game-container" class="relative w-full aspect-[4/5] bg-white rounded-[2rem] shadow-lg border-[6px] border-white overflow-hidden ring-1 ring-rose-50 game-canvas">
            
            <!-- Initial Start Screen Overlay -->
            <div id="screen-start" class="absolute inset-0 flex flex-col items-center justify-center bg-white/30 backdrop-blur-sm z-40 p-6 text-center">
                <!-- 원 내부 딸기 위치 수정을 위해 pb-2 추가 및 정렬 조정 -->
                <div class="w-24 h-24 bg-rose-50 rounded-full flex items-center justify-center animate-bounce shadow-inner mb-4 text-6xl pb-2">🍓</div>
                <h1 class="text-5xl font-normal text-rose-400 mb-4 title-font drop-shadow-sm">베리 팡팡!</h1>
                <p class="text-gray-400 mb-8 text-lg">나오는 딸기를 터치하세요!<br><span class="text-xs opacity-60">(Space 키로 시작 가능)</span></p>
                <button onclick="startGame()" class="bg-rose-400 hover:scale-105 active:scale-95 transition-transform text-white px-10 py-4 rounded-xl text-xl font-bold shadow-md border-b-4 border-rose-600">게임 시작</button>
            </div>

            <!-- Final Result Screen Overlay -->
            <div id="screen-end" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-white/95 z-40 p-6 text-center">
                <h2 class="text-3xl font-bold text-gray-800 mb-1">FINISH!</h2>
                <div class="my-6 p-8 bg-rose-50/50 rounded-[2.5rem] border-2 border-rose-50 w-full max-w-[220px] shadow-inner">
                    <p class="text-rose-300 font-bold text-xs mb-1 uppercase tracking-widest">Final Score</p>
                    <p id="final-score" class="text-6xl font-bold text-rose-500 tracking-tighter">0</p>
                </div>
                <div id="new-record" class="hidden mb-6 text-yellow-500 font-bold text-lg flex items-center gap-2 animate-bounce">🏆 NEW RECORD!</div>
                <div class="flex flex-col w-full gap-3 max-w-[220px]">
                    <button onclick="startGame()" class="bg-rose-400 hover:scale-105 active:scale-95 transition-transform text-white px-6 py-4 rounded-xl text-xl font-bold shadow-md border-b-4 border-rose-600">다시 도전</button>
                    <button onclick="showStartScreen()" class="bg-white hover:scale-105 active:scale-95 transition-transform text-gray-300 px-6 py-3 rounded-xl text-lg font-bold border-b-4 border-gray-50">메인으로</button>
                </div>
            </div>

            <!-- Active Play Area for Dynamic Items -->
            <div id="play-area" class="absolute inset-0 z-10 pointer-events-none"></div>
        </div>

        <!-- Gameplay Item Legend -->
        <div class="mt-6 flex justify-center items-center gap-6 w-full bg-white/40 py-3 px-4 rounded-xl border border-rose-50 shadow-sm">
            <div class="flex items-center gap-1.5">
                <div class="w-8 h-8 bg-white rounded-lg shadow-sm flex items-center justify-center border border-rose-50 text-lg">🍓</div>
                <span class="text-[10px] font-bold text-rose-400">+1</span>
            </div>
            <div class="flex items-center gap-1.5">
                <div class="w-8 h-8 bg-white rounded-lg shadow-sm flex items-center justify-center border border-rose-50 text-lg">✨</div>
                <span class="text-[10px] font-bold text-yellow-400">+5</span>
            </div>
            <div class="flex items-center gap-1.5">
                <div class="w-8 h-8 bg-white rounded-lg shadow-sm flex items-center justify-center border border-rose-50 text-lg">💣</div>
                <span class="text-[10px] font-bold text-gray-400">-5</span>
            </div>
        </div>
    </div>

    <script>
        // Game Logic States
        let score = 0;
        let timeLeft = 30;
        let highScore = localStorage.getItem('berryPangHighScore') || 0;
        let gameActive = false;
        let spawnInterval, timerInterval;

        // DOM Element Cache
        const scoreDisplay = document.getElementById('score-display');
        const timerDisplay = document.getElementById('timer-display');
        const bestDisplay = document.getElementById('best-display');
        const playArea = document.getElementById('play-area');
        const screenStart = document.getElementById('screen-start');
        const screenEnd = document.getElementById('screen-end');
        
        bestDisplay.innerText = highScore;

        /**
         * Resets the game state and starts a new session
         */
        function startGame() {
            score = 0;
            timeLeft = 30;
            gameActive = true;
            updateUI();
            
            screenStart.classList.add('hidden');
            screenEnd.classList.add('hidden');
            playArea.innerHTML = '';
            playArea.classList.remove('pointer-events-none');
            playArea.style.pointerEvents = 'auto';

            clearInterval(spawnInterval);
            clearInterval(timerInterval);

            // Timer Loop
            timerInterval = setInterval(() => {
                timeLeft--;
                updateUI();
                if (timeLeft <= 0) endGame();
            }, 1000);

            // Spawning Loop
            spawnInterval = setInterval(spawnItem, 650);
        }

        /**
         * Creates and animates a random game item
         */
        function spawnItem() {
            if (!gameActive) return;

            const item = document.createElement('button');
            const typeRand = Math.random();
            let type = 'STRAWBERRY';
            let content = '🍓';
            let extraClass = '';

            // Weighted Random Selection
            if (typeRand > 0.88) {
                type = 'GOLDEN';
                content = '<div class="relative">✨<div class="absolute inset-0 brightness-110 saturate-150">🍓</div></div>';
                extraClass = 'scale-110';
            } else if (typeRand > 0.78) {
                type = 'BOMB';
                content = '💣';
            }

            item.className = `item-btn pop-item ${extraClass}`;
            item.innerHTML = `<div class="text-5xl md:text-6xl drop-shadow-md select-none">${content}</div>`;
            
            // Random Position & Rotation within safe bounds
            const x = Math.random() * 80 + 10;
            const y = Math.random() * 70 + 15;
            const rotation = Math.random() * 40 - 20;

            item.style.left = `${x}%`;
            item.style.top = `${y}%`;
            item.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;

            // Click Handler
            item.onmousedown = (e) => {
                e.preventDefault();
                e.stopPropagation();
                handleItemClick(type);
                item.remove();
            };

            // Touch Handler for better mobile response
            item.ontouchstart = (e) => {
                e.preventDefault();
                e.stopPropagation();
                handleItemClick(type);
                item.remove();
            };

            playArea.appendChild(item);

            // Auto-remove item after 1 second if not clicked
            setTimeout(() => {
                if (item.parentNode) item.remove();
            }, 1000);
        }

        /**
         * Processes point calculation based on item type
         */
        function handleItemClick(type) {
            if (!gameActive) return;

            if (type === 'BOMB') {
                score = Math.max(0, score - 5);
            } else if (type === 'GOLDEN') {
                score += 5;
            } else {
                score += 1;
            }
            updateUI();
        }

        /**
         * Updates the visual HUD elements
         */
        function updateUI() {
            scoreDisplay.innerText = score;
            timerDisplay.innerText = `${timeLeft}s`;
            if (timeLeft <= 5) {
                timerDisplay.classList.add('text-red-400', 'animate-pulse');
            } else {
                timerDisplay.classList.remove('text-red-400', 'animate-pulse');
            }
        }

        /**
         * Stops loops and displays results screen
         */
        function endGame() {
            gameActive = false;
            clearInterval(spawnInterval);
            clearInterval(timerInterval);
            playArea.style.pointerEvents = 'none';

            document.getElementById('final-score').innerText = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('berryPangHighScore', highScore);
                bestDisplay.innerText = highScore;
                document.getElementById('new-record').classList.remove('hidden');
            } else {
                document.getElementById('new-record').classList.add('hidden');
            }

            screenEnd.classList.remove('hidden');
        }

        /**
         * Shows the start menu
         */
        function showStartScreen() {
            screenEnd.classList.add('hidden');
            screenStart.classList.remove('hidden');
        }

        /**
         * Global Keyboard Shortcuts
         */
        window.addEventListener('keydown', (e) => {
            if ((e.code === 'Space' || e.code === 'Enter') && !gameActive) {
                startGame();
            }
        });
    </script>
</body>
</html>
