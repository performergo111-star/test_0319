<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전통 인장 제작소</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 전통적인 느낌을 주는 명조 및 바탕체 계열 폰트 임포트 */
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&family=Noto+Serif+KR:wght@700;900&display=swap');
        
        :root {
            --hanji-bg: #f4f0e6;
            --traditional-red: #af2b28;
            --traditional-black: #2c2c2c;
            --traditional-gold: #c5a35d;
        }

        body {
            background-color: var(--hanji-bg);
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
            font-family: 'Nanum Myeongjo', 'Gungsuh', 'GungsuhChe', serif;
            color: var(--traditional-black);
            overflow-x: hidden;
        }

        .traditional-border {
            border: 10px double var(--traditional-gold);
            position: relative;
        }

        .traditional-border::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 1px solid var(--traditional-gold);
            pointer-events: none;
        }

        .stamp-preview-area {
            background: white;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
            border: 1px solid #ddd;
            position: relative;
            width: 100%;
            max-width: 320px;
            aspect-ratio: 1 / 1;
        }

        input::placeholder {
            color: #aaa;
            font-style: italic;
        }

        .btn-traditional {
            transition: all 0.3s ease;
            letter-spacing: 0.1em;
        }

        .btn-traditional:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--traditional-red);
            border-style: solid;
        }
        .top-left { top: 5px; left: 5px; border-width: 2px 0 0 2px; }
        .top-right { top: 5px; right: 5px; border-width: 2px 2px 0 0; }
        .bottom-left { bottom: 5px; left: 5px; border-width: 0 0 2px 2px; }
        .bottom-right { bottom: 5px; right: 5px; border-width: 0 2px 2px 0; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl">
        <!-- Title Section -->
        <div class="text-center mb-8 relative">
            <div class="inline-block px-6 py-3 border-y-2 border-double border-[#c5a35d]">
                <h1 class="text-2xl md:text-4xl font-extrabold text-[#af2b28] mb-1">전통 인장 제작소</h1>
                <p class="text-xs text-gray-700 tracking-widest">傳統 印章 製作所</p>
            </div>
        </div>

        <div class="traditional-border bg-white/90 p-4 md:p-8 rounded-sm">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>

            <div class="flex flex-col md:flex-row gap-6 md:gap-10 items-center md:items-start">
                <!-- Stamp Preview -->
                <div class="w-full max-w-[280px] md:max-w-[320px] flex-shrink-0">
                    <div class="stamp-preview-area mx-auto p-2 rounded-sm overflow-hidden">
                        <canvas id="stampCanvas" width="320" height="320" class="w-full h-full cursor-crosshair"></canvas>
                    </div>
                    <p class="text-center text-[10px] mt-2 text-gray-400 font-sans tracking-tighter">PREVIEW CANVAS</p>
                </div>

                <!-- Control Panel -->
                <div class="w-full flex-1 space-y-6">
                    <div class="w-full">
                        <label for="nameInput" class="block text-lg font-bold mb-2 text-gray-800">성명(姓名) 입력</label>
                        <input type="text" id="nameInput" maxlength="4" placeholder="성함을 입력하시오" 
                               class="w-full bg-transparent border-b-2 border-[#c5a35d] py-3 px-1 text-xl md:text-2xl focus:outline-none focus:border-[#af2b28] transition-colors appearance-none font-serif">
                        <p class="text-[11px] text-gray-500 mt-2">* 최대 4자까지 입력 가능합니다.</p>
                    </div>

                    <div class="pt-2 space-y-3">
                        <button id="downloadBtn" class="btn-traditional w-full py-4 bg-[#af2b28] text-white font-bold rounded-sm shadow-md hover:bg-[#8e2321] active:scale-95">
                            인장 내려받기 (保存)
                        </button>
                        <button id="resetBtn" class="btn-traditional w-full py-3 bg-white border border-[#c5a35d] text-[#c5a35d] font-bold rounded-sm hover:bg-[#fcfaf5] active:scale-95">
                            새로 고침 (初期화)
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <p class="text-center mt-6 text-[10px] md:text-xs text-gray-500 font-sans italic px-4">
            본 어플리케이션은 한국 전통 인장의 미를 디지털로 재현합니다.
        </p>

        <!-- Message Alert -->
        <div id="messageBox" class="hidden fixed top-10 left-1/2 transform -translate-x-1/2 bg-[#2c2c2c] text-white px-8 py-3 rounded-sm shadow-2xl transition-all duration-300 z-50 border border-[#c5a35d] whitespace-nowrap">
            메시지
        </div>
    </div>

    <script>
        const canvas = document.getElementById('stampCanvas');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('nameInput');
        const resetBtn = document.getElementById('resetBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const messageBox = document.getElementById('messageBox');

        // 도장에 사용할 폰트 스택 정의 (옛스러운 느낌의 폰트 우선 순위)
        const stampFontStack = "'Nanum Myeongjo', 'Gungsuh', 'GungsuhChe', 'Noto Serif KR', serif";

        function showMessage(text) {
            messageBox.textContent = text;
            messageBox.classList.remove('hidden');
            setTimeout(() => {
                messageBox.classList.add('hidden');
            }, 2000);
        }

        function drawStamp() {
            const name = nameInput.value.trim();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (!name) {
                ctx.strokeStyle = '#f0f0f0';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(160, 160, 130, 0, Math.PI * 2);
                ctx.stroke();
                return;
            };

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 135; 
            const strokeWidth = 14; 
            const stampColor = '#af2b28'; 

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = stampColor;
            ctx.lineWidth = strokeWidth;
            ctx.stroke();

            ctx.fillStyle = stampColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const len = name.length;
            
            if (len === 1) {
                ctx.font = `bold 180px ${stampFontStack}`;
                ctx.fillText(name, centerX, centerY);
            } 
            else if (len === 2) {
                const fontSize = 130;
                ctx.font = `bold ${fontSize}px ${stampFontStack}`;
                const offset = fontSize * 0.38; // 자간을 더 좁게 유지
                ctx.fillText(name[0], centerX, centerY - offset);
                ctx.fillText(name[1], centerX, centerY + offset);
            }
            else if (len === 3) {
                ctx.font = `bold 115px ${stampFontStack}`;
                ctx.fillText(name[0], centerX, centerY - 52);
                
                ctx.font = `bold 100px ${stampFontStack}`;
                ctx.fillText(name[1], centerX - 48, centerY + 62);
                ctx.fillText(name[2], centerX + 48, centerY + 62);
            }
            else if (len >= 4) {
                const fontSize = 105;
                ctx.font = `bold ${fontSize}px ${stampFontStack}`;
                const offset = 50; 
                
                ctx.fillText(name[0], centerX - offset, centerY - offset); 
                ctx.fillText(name[1], centerX + offset, centerY - offset); 
                ctx.fillText(name[2], centerX - offset, centerY + offset); 
                ctx.fillText(name[3], centerX + offset, centerY + offset); 
            }

            addAntiqueEffect(stampColor);
        }

        function addAntiqueEffect(color) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                if (data[i] > 0) {
                    // 마모 효과를 살짝 더 랜덤하게 주어 붓글씨의 느낌 강조
                    if (Math.random() > 0.93) {
                        data[i+3] = 0; 
                    }
                }
                else if (Math.random() > 0.9992) {
                    const rgb = hexToRgb(color);
                    data[i] = rgb.r;
                    data[i+1] = rgb.g;
                    data[i+2] = rgb.b;
                    data[i+3] = 110;
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 175, g: 43, b: 40 };
        }

        nameInput.addEventListener('input', drawStamp);

        resetBtn.addEventListener('click', () => {
            nameInput.value = '';
            drawStamp();
            showMessage('초기화되었습니다.');
        });

        downloadBtn.addEventListener('click', () => {
            if (!nameInput.value.trim()) {
                showMessage('성함을 입력해 주십시오.');
                return;
            }
            const link = document.createElement('a');
            link.download = `전통인장_${nameInput.value.trim()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showMessage('인장이 성공적으로 저장되었습니다.');
        });

        // 폰트 로딩 완료 후 그리도록 대기
        document.fonts.ready.then(() => {
            drawStamp();
        });
    </script>
</body>
</html>
